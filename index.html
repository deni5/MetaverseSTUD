      material="color:#f8f5f0;roughness:0.95"></a-box>
    <a-box width="1.4" height="1.4" depth="1.4" position="15.8 0.7 -5"
      material="color:#f0ede8;roughness:0.95"></a-box>
    <a-cylinder height="0.06" radius="0.7" position="-11.5 0.45 -5"
      material="color:#dde8ff;opacity:0.55;transparent:true;metalness:0.85"></a-cylinder>
    <a-cylinder height="0.06" radius="0.7" position="11.5 0.45 -5"
      material="color:#dde8ff;opacity:0.55;transparent:true;metalness:0.85"></a-cylinder>

    <!-- Рослини -->
    <a-cylinder height="0.85" radius="0.28" position="-18 0.42 -18"
      material="color:#f5f5f0;roughness:0.95"></a-cylinder>
    <a-cylinder height="1.3" radius="0.22" position="-18 1.07 -18"
      material="color:#4ade80;roughness:0.75"></a-cylinder>
    <a-cylinder height="0.85" radius="0.28" position="18 0.42 -18"
      material="color:#f5f5f0;roughness:0.95"></a-cylinder>
    <a-cylinder height="1.5" radius="0.22" position="18 1.17 -18"
      material="color:#22c55e;roughness:0.75"></a-cylinder>
    <a-cylinder height="0.75" radius="0.22" position="-18 0.37 6"
      material="color:#f5f5f0;roughness:0.95"></a-cylinder>
    <a-cylinder height="1.1" radius="0.18" position="-18 0.92 6"
      material="color:#86efac;roughness:0.8"></a-cylinder>
    <a-cylinder height="0.75" radius="0.22" position="18 0.37 6"
      material="color:#f5f5f0;roughness:0.95"></a-cylinder>
    <a-cylinder height="1.2" radius="0.18" position="18 0.97 6"
      material="color:#4ade80;roughness:0.8"></a-cylinder>

    <!-- Портал → Хол -->
    <a-plane width="5" height="7" position="0 3.5 19"
      material="color:#f59e0b;opacity:0.65;transparent:true"></a-plane>
    <a-text value="Хол" position="0 7.2 18.9" align="center" color="#fcd34d" width="5" rotation="0 180 0"></a-text>
    <a-plane width="5" height="7" position="0 3.5 19"
      class="gaze-portal" material="opacity:0;transparent:true"
      data-dest-x="0" data-dest-y="1.6" data-dest-z="0" data-rot="0"
      data-room="Головний хол"></a-plane>

  <!-- ══════════════════════════════════════════
       КАМЕРА
  ══════════════════════════════════════════ -->
  <a-entity id="player" position="0 1.6 6">
    <a-camera id="cam" wasd-controls look-controls>
      <a-cursor
        color="#ffffff"
        fuse="true"
        fuse-timeout="2000"
        raycaster="objects: .gaze-portal"
        animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
        geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
        material="color: white; shader: flat">
      </a-cursor>
    </a-camera>
  </a-entity>

</a-scene>

<script>
  const label = document.getElementById('room-label');

  document.querySelectorAll('.gaze-portal').forEach(portal => {
    portal.addEventListener('click', () => {
      const x = parseFloat(portal.dataset.destX);
      const y = parseFloat(portal.dataset.destY);
      const z = parseFloat(portal.dataset.destZ);
      const rot = parseFloat(portal.dataset.rot) || 0;
      const room = portal.dataset.room || '';

      const player = document.getElementById('player');
      const cam = document.getElementById('cam');
      player.setAttribute('position', {x, y, z});
      cam.setAttribute('rotation', {x: 0, y: rot, z: 0});
      if (room) label.textContent = room;
    });

    portal.addEventListener('mouseenter', () => {
      portal.previousElementSibling && portal.previousElementSibling.setAttribute
        ? null : null;
    });
  });
</script>

</body>
</html>
