<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cosmic Hall</title>
  <script src="./aframe.min.js"></script>
</head>
<body>
<a-scene background="color: #e8f0ff">
  <a-light type="ambient" color="#e8f0ff" intensity="1.4"></a-light>
  <a-light type="directional" color="#fff5e0" intensity="0.6" position="30 60 20"></a-light>
  <a-box width="30" height="8" depth="30" position="0 4 0"
    material="color:#b8d4ff;opacity:0.12;transparent:true;side:double"></a-box>
  <a-plane width="30" height="30" rotation="-90 0 0"
    material="color:#dde8ff;opacity:0.25;metalness:0.6;roughness:0.2;transparent:true"></a-plane>
  <a-sphere position="-80 20 -60" radius="28" color="#f0c06e" roughness="0.7"
    animation="property:rotation;to:0 360 0;loop:true;dur:40000;easing:linear"></a-sphere>
  <a-sphere position="90 15 -50" radius="18" color="#7c9fff" roughness="0.6"
    animation="property:rotation;to:0 360 0;loop:true;dur:55000;easing:linear"></a-sphere>
  <a-sphere position="-50 50 -90" radius="14" color="#a78bfa" roughness="0.8"
    animation="property:rotation;to:0 360 0;loop:true;dur:35000;easing:linear"></a-sphere>
  <a-sphere position="60 -10 -70" radius="10" color="#f87171" roughness="0.75"
    animation="property:rotation;to:0 360 0;loop:true;dur:28000;easing:linear"></a-sphere>
  <a-box width="8" height="0.4" depth="5" position="0 0.2 -10"
    material="color:#1a2040;opacity:0.85"></a-box>
  <a-cylinder height="1.2" radius="0.03" position="0 0.9 -10"
    material="color:#ffffff;opacity:0.7"></a-cylinder>
  <a-box width="2.5" height="0.5" depth="1" position="-10 0.25 -3"
    material="color:#f0ede8;roughness:0.95"></a-box>
  <a-box width="2.5" height="0.5" depth="1" position="10 0.25 -3"
    material="color:#f0ede8;roughness:0.95"></a-box>
  <a-entity position="0 1.6 12">
    <a-camera wasd-controls look-controls></a-camera>
  </a-entity>
</a-scene>
</body>
</html>
