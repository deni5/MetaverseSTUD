<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MetaverseSTUD</title>
  <script src="./aframe.min.js"></script>
  <style>
    #ui { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
          background:rgba(0,0,0,0.6); color:#fff; padding:8px 20px;
          border-radius:20px; font-family:sans-serif; font-size:13px;
          pointer-events:none; z-index:999; }
    #room-label { position:fixed; top:20px; left:50%; transform:translateX(-50%);
          background:rgba(0,0,0,0.5); color:#fff; padding:6px 18px;
          border-radius:20px; font-family:sans-serif; font-size:14px; font-weight:500;
          pointer-events:none; z-index:999; }
  </style>
</head>
<body>
<div id="ui">WASD — рух · Миша — погляд · Дивись на портал 2 сек → перехід</div>
<div id="room-label">Головний хол</div>

<a-scene>

  <a-assets>
    <img id="cuneiform" src="./assets/cuneiform.jpg" crossorigin="anonymous">
    <img id="dean" src="./assets/dean.jpg" crossorigin="anonymous">
    <video id="nft-video-15" src="./assets/nft15.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
  </a-assets>

  <a-sky color="#0d0500"></a-sky>

  <!-- ══════════════════════════════════════════
       ГОЛОВНИЙ ХОЛ — Вавілонський храм
  ══════════════════════════════════════════ -->
  <a-entity id="main-hall">

    <!-- Підлога — темний камінь -->
    <a-plane width="80" height="60" rotation="-90 0 0" position="0 0 0"
      material="color:#1a1208;roughness:0.95"></a-plane>
    <a-plane width="40" height="30" rotation="-90 0 0" position="0 0.01 0"
      material="color:#2a1a08;opacity:0.4;transparent:true;metalness:0.3;roughness:0.6"></a-plane>

    <!-- Стеля з отворами для сонця -->
    <a-plane width="80" height="60" rotation="90 0 0" position="0 30 0"
      material="color:#0d0800;roughness:1"></a-plane>

    <!-- Промені сонця крізь отвори -->
    <a-entity position="-15 30 -10">
      <a-cylinder height="22" radius="0.5" position="0 -11 0"
        material="color:#ffcc44;opacity:0.07;transparent:true;side:double"></a-cylinder>
      <a-cylinder height="22" radius="1.2" position="0 -11 0"
        material="color:#ffaa22;opacity:0.03;transparent:true;side:double"></a-cylinder>
    </a-entity>
    <a-entity position="0 30 -5">
      <a-cylinder height="22" radius="0.8" position="0 -11 0"
        material="color:#ffdd55;opacity:0.10;transparent:true;side:double"></a-cylinder>
      <a-cylinder height="22" radius="2.0" position="0 -11 0"
        material="color:#ffcc44;opacity:0.04;transparent:true;side:double"></a-cylinder>
    </a-entity>
    <a-entity position="15 30 -10">
      <a-cylinder height="22" radius="0.5" position="0 -11 0"
        material="color:#ffcc44;opacity:0.07;transparent:true;side:double"></a-cylinder>
      <a-cylinder height="22" radius="1.2" position="0 -11 0"
        material="color:#ffaa22;opacity:0.03;transparent:true;side:double"></a-cylinder>
    </a-entity>
    <a-entity position="-5 22 5">
      <a-cylinder height="22" radius="0.4" position="0 -11 0"
        material="color:#ffcc44;opacity:0.05;transparent:true;side:double"></a-cylinder>
    </a-entity>
    <a-entity position="5 22 3">
      <a-cylinder height="22" radius="0.35" position="0 -11 0"
        material="color:#ffcc44;opacity:0.04;transparent:true;side:double"></a-cylinder>
    </a-entity>

    <!-- Освітлення від сонячних променів -->
    <a-light type="point" color="#ffaa22" intensity="1.0" position="-8 20 -5"></a-light>
    <a-light type="point" color="#ffcc44" intensity="1.4" position="0 20 -2"></a-light>
    <a-light type="point" color="#ffaa22" intensity="1.0" position="8 20 -5"></a-light>
    <a-light type="point" color="#ff8800" intensity="0.5" position="-5 20 5"></a-light>
    <a-light type="point" color="#ff8800" intensity="0.4" position="5 20 3"></a-light>
    <a-light type="ambient" color="#3d2200" intensity="0.5"></a-light>
    <a-light type="directional" color="#ffaa44" intensity="0.3" position="2 20 5"></a-light>

    <!-- Стіни з клінописом — північ -->
    <a-plane width="80" height="30" position="0 15 -30"
      material="src:#cuneiform;repeat:6 3;roughness:0.85"></a-plane>

    <!-- Стіни з клінописом — схід -->
    <a-plane width="60" height="30" position="-40 15 0" rotation="0 90 0"
      material="src:#cuneiform;repeat:4 3;roughness:0.85"></a-plane>

    <!-- Стіни з клінописом — захід -->
    <a-plane width="60" height="30" position="40 15 0" rotation="0 -90 0"
      material="src:#cuneiform;repeat:4 3;roughness:0.85"></a-plane>

    <!-- Клінописні таблички на стінах -->
    <a-plane width="1.2" height="0.8" position="-18 5 -29.8"
      material="color:#c8a54a;roughness:0.8"></a-plane>
    <a-plane width="1.2" height="0.8" position="-6 5 -29.8"
      material="color:#b8953a;roughness:0.8"></a-plane>
    <a-plane width="1.2" height="0.8" position="6 5 -29.8"
      material="color:#c8a54a;roughness:0.8"></a-plane>
    <a-plane width="1.2" height="0.8" position="-12 5 -29.8"
      material="color:#b8953a;roughness:0.8"></a-plane>
    <a-plane width="1.2" height="0.8" position="12 5 -29.8"
      material="color:#c8a54a;roughness:0.8"></a-plane>

    <!-- АЛТАР з портретом завідуючого — величний до стелі -->
    <a-box width="10" height="0.6" depth="3" position="0 0.3 -25"
      material="color:#2a1a00;roughness:0.85;metalness:0.2"></a-box>
    <a-box width="8" height="0.4" depth="2.5" position="0 0.8 -25"
      material="color:#3a2800;roughness:0.8;metalness:0.3"></a-box>
    <a-box width="7" height="19" depth="0.4" position="0 10 -26"
      material="color:#1a0e00;roughness:0.95"></a-box>
    <!-- Золота рамка -->
    <a-plane width="7.4" height="9.4" position="0 9 -14.1"
      material="color:#c8a54a;roughness:0.6;metalness:0.5"></a-plane>
    <!-- Портрет -->
    <a-plane width="6.8" height="8.8" position="0 10 -25.8"
      material="src:#dean;roughness:0.5"></a-plane>
    <!-- Верхній орнамент -->
    <a-box width="7.6" height="0.4" depth="0.3" position="0 19 -26"
      material="color:#c8a54a;roughness:0.6;metalness:0.5"></a-box>
    <!-- Нижній орнамент -->
    <a-box width="7.6" height="0.4" depth="0.3" position="0 4 -26"
      material="color:#c8a54a;roughness:0.6;metalness:0.5"></a-box>
    <a-text value="Завідуючий кафедрою" position="0 1.5 -24.5"
      align="center" color="#ffd700" width="7"></a-text>
    <a-light type="spot" color="#ffeeaa" intensity="3.0" position="0 28 -18"
      target="#altar" angle="20"></a-light>
    <a-light type="spot" color="#ffdd88" intensity="2.0" position="-5 28 -18"
      target="#altar" angle="15"></a-light>
    <a-light type="spot" color="#ffdd88" intensity="2.0" position="5 28 -18"
      target="#altar" angle="15"></a-light>
    <a-entity id="altar" position="0 10 -25.8"></a-entity>

    <!-- Свічки біля алтаря -->
    <a-cylinder height="0.4" radius="0.05" position="-1.5 0.7 -24.5"
      material="color:#f5f0e0"></a-cylinder>
    <a-cylinder height="0.4" radius="0.05" position="1.5 0.7 -24.5"
      material="color:#f5f0e0"></a-cylinder>
    <a-sphere radius="0.06" position="-1.5 0.92 -24.5"
      material="color:#ffcc00;emissive:#ffaa00;emissiveIntensity:0.8"></a-sphere>
    <a-sphere radius="0.06" position="1.5 0.92 -24.5"
      material="color:#ffcc00;emissive:#ffaa00;emissiveIntensity:0.8"></a-sphere>
    <a-light type="point" color="#ff8800" intensity="0.4" position="-1.5 1.2 -24.5" distance="3"></a-light>
    <a-light type="point" color="#ff8800" intensity="0.4" position="1.5 1.2 -24.5" distance="3"></a-light>

    <!-- Портал → NFT Галерея (замість старого коридору) -->
    <a-entity position="-38 0 0">
      <a-plane width="5" height="8" position="0 4 0" rotation="0 90 0"
        material="color:#7c3aed;opacity:0.75;transparent:true"></a-plane>
      <a-text value="NFT Галерея" position="0 8.5 0" align="center"
        color="#a78bfa" width="6" rotation="0 90 0"></a-text>
      <a-plane width="5" height="8" position="0 4 0" rotation="0 90 0"
        class="gaze-portal" material="opacity:0;transparent:true"
        data-dest-x="-120" data-dest-y="1.6" data-dest-z="0" data-rot="90" 
        data-room="NFT Галерея"></a-plane>
    </a-entity>

    <!-- Портал → Технарі -->
    <a-entity position="38 0 0">
      <a-plane width="5" height="8" position="0 4 0" rotation="0 -90 0"
        material="color:#2563eb;opacity:0.75;transparent:true"></a-plane>
      <a-text value="Технарі" position="0 8.5 0" align="center"
        color="#60a5fa" width="6" rotation="0 -90 0"></a-text>
      <a-plane width="5" height="8" position="0 4 0" rotation="0 -90 0"
        class="gaze-portal" material="opacity:0;transparent:true"
        data-dest-x="120" data-dest-y="1.6" data-dest-z="0" data-rot="-90"
        data-room="Коридор технарів"></a-plane>
    </a-entity>

    <!-- Портал → Проекти -->
    <a-entity position="0 0 28">
      <a-plane width="5" height="8" position="0 4 0" rotation="0 180 0"
        material="color:#0f766e;opacity:0.75;transparent:true"></a-plane>
      <a-text value="Проекти" position="0 8.5 0" align="center"
        color="#2dd4bf" width="6" rotation="0 180 0"></a-text>
      <a-plane width="5" height="8" position="0 4 0" rotation="0 180 0"
        class="gaze-portal" material="opacity:0;transparent:true"
        data-dest-x="0" data-dest-y="1.6" data-dest-z="100" data-rot="180"
        data-room="Кімната проектів"></a-plane>
    </a-entity>

    <!-- Портал → Cosmic Hall -->
    <a-entity position="38 0 10">
      <a-plane width="5" height="8" position="0 4 0" rotation="0 -90 0"
        material="color:#38bdf8;opacity:0.75;transparent:true"></a-plane>
      <a-text value="Cosmic Hall" position="0 8.5 0" align="center"
        color="#7dd3fc" width="6" rotation="0 -90 0"></a-text>
      <a-plane width="5" height="8" position="0 4 0" rotation="0 -90 0"
        class="gaze-portal" material="opacity:0;transparent:true"
        data-dest-x="0" data-dest-y="1.6" data-dest-z="-150" data-rot="0"
        data-room="Cosmic Hall"></a-plane>
    </a-entity>

  </a-entity>

  <!-- ══════════════════════════════════════════
       NFT ГАЛЕРЕЯ — кругла зала
       X: -60
  ══════════════════════════════════════════ -->
  <a-entity id="nft-gallery" position="-120 0 0">

    <!-- Кругла підлога -->
    <a-cylinder height="0.1" radius="50" position="0 0 0"
      material="color:#0d0d1a;roughness:0.8;metalness:0.3"></a-cylinder>

    <!-- Стеля -->
    <a-cylinder height="0.3" radius="50" position="0 20 0"
      material="color:#080810;roughness:0.9"></a-cylinder>

    <!-- Кругла стіна -->
    <a-cylinder height="20" radius="50" position="0 10 0"
      material="color:#0a0a18;roughness:0.85;side:back"></a-cylinder>

    <!-- Центральний світильник -->
    <a-sphere radius="1.2" position="0 19 0"
      material="color:#ffffff;emissive:#8888ff;emissiveIntensity:0.6"></a-sphere>
    <a-light type="point" color="#aaaaff" intensity="2.0" position="0 18 0" distance="60"></a-light>
    <a-light type="ambient" color="#1a1a2e" intensity="0.8"></a-light>

    <!-- Паркетна підлога з відбиттям -->
    <a-plane width="100" height="100" rotation="-90 0 0" position="0 0.05 0"
      material="color:#1a1a2e;roughness:0.1;metalness:0.5"></a-plane>

    <!-- Портал назад до холу -->
    <a-plane width="5" height="9" position="48 4.5 0" rotation="0 -90 0"
      material="color:#f59e0b;opacity:0.65;transparent:true"></a-plane>
    <a-text value="Хол" position="21 7.2 0" align="center"
      color="#fcd34d" width="4" rotation="0 -90 0"></a-text>
    <a-plane width="5" height="9" position="48 4.5 0" rotation="0 -90 0"
      class="gaze-portal" material="opacity:0;transparent:true"
      data-dest-x="0" data-dest-y="1.6" data-dest-z="0" data-rot="0"
      data-room="Головний хол"></a-plane>

    <!-- NFT рамки розміщуються через JS по колу -->

  </a-entity>

  <!-- ══════════════════════════════════════════
       КОРИДОР ТЕХНАРІВ  X=+60
  ══════════════════════════════════════════ -->
  <a-entity position="120 0 0">
    <a-plane width="70" height="10" position="0 5 -6"
      material="color:#1e3a5f;roughness:0.9"></a-plane>
    <a-plane width="70" height="10" position="0 5 6" rotation="0 180 0"
      material="color:#1e3a5f;roughness:0.9"></a-plane>
    <a-plane width="12" height="10" position="35 5 0" rotation="0 -90 0"
      material="color:#0c2340;roughness:0.9"></a-plane>
    <a-plane width="12" height="10" position="-35 5 0" rotation="0 90 0"
      material="color:#0c2340;roughness:0.9"></a-plane>
    <a-plane width="70" height="12" rotation="-90 0 0" position="0 0 0"
      material="color:#0a1628;roughness:0.8"></a-plane>
    <a-plane width="70" height="12" rotation="90 0 0" position="0 10 0"
      material="color:#060e1a;roughness:0.9"></a-plane>
    <a-light type="point" color="#3b82f6" intensity="1.2" position="0 8 0"></a-light>

    <a-plane width="6" height="7" position="0 3.5 -5.8"
      material="color:#1d4ed8;opacity:0.9"></a-plane>
    <a-text value="Proof-of-History" position="0 7.2 -5.7" align="center" color="#bfdbfe" width="7"></a-text>
    <a-text value="Solana · часовий ланцюг" position="0 6.2 -5.7" align="center" color="#93c5fd" width="6"></a-text>
    <a-plane width="6" height="7" position="0 3.5 -5.8"
      class="gaze-portal" material="opacity:0;transparent:true"
      data-dest-x="120" data-dest-y="1.6" data-dest-z="-20" data-rot="0"
      data-room="Proof-of-History"></a-plane>

    <a-plane width="5" height="7" position="-15 3.5 -5.8"
      material="color:#020810;opacity:0.98"></a-plane>
    <a-text value="???" position="-15 7.2 -5.7" align="center" color="#1e3a5f" width="5"></a-text>
    <a-text value="Скоро відкриття" position="-15 6.2 -5.7" align="center" color="#2563eb" width="5"></a-text>
    <a-light type="point" color="#3b82f6" intensity="0.2" position="-15 4 -4" distance="6"
      animation="property:intensity;from:0.05;to:0.5;loop:true;dur:900;direction:alternate"></a-light>

    <a-plane width="5" height="7" position="15 3.5 -5.8"
      material="color:#020810;opacity:0.98"></a-plane>
    <a-text value="???" position="15 7.2 -5.7" align="center" color="#1e3a5f" width="5"></a-text>
    <a-text value="Скоро відкриття" position="15 6.2 -5.7" align="center" color="#2563eb" width="5"></a-text>
    <a-light type="point" color="#60a5fa" intensity="0.15" position="15 4 -4" distance="6"
      animation="property:intensity;from:0.03;to:0.4;loop:true;dur:1500;direction:alternate"></a-light>

    <a-plane width="4" height="7" position="-34 3.5 0" rotation="0 90 0"
      material="color:#f59e0b;opacity:0.65;transparent:true"></a-plane>
    <a-text value="Хол" position="-34 7.2 0" align="center" color="#fcd34d" width="4" rotation="0 90 0"></a-text>
    <a-plane width="4" height="7" position="-34 3.5 0" rotation="0 90 0"
      class="gaze-portal" material="opacity:0;transparent:true"
      data-dest-x="0" data-dest-y="1.6" data-dest-z="0" data-rot="0"
      data-room="Головний хол"></a-plane>

    <a-plane width="4" height="7" position="34 3.5 0" rotation="0 -90 0"
      material="color:#38bdf8;opacity:0.7;transparent:true"></a-plane>
    <a-text value="Cosmic Hall" position="34 7.2 0" align="center" color="#7dd3fc" width="5" rotation="0 -90 0"></a-text>
    <a-plane width="4" height="7" position="34 3.5 0" rotation="0 -90 0"
      class="gaze-portal" material="opacity:0;transparent:true"
      data-dest-x="0" data-dest-y="1.6" data-dest-z="-150" data-rot="0"
      data-room="Cosmic Hall"></a-plane>
  </a-entity>

  <!-- ══════════════════════════════════════════
       КІМНАТА ПРОЕКТІВ  Z=+50
  ══════════════════════════════════════════ -->
  <a-entity position="0 0 100">
    <a-plane width="24" height="10" position="0 5 -10"
      material="color:#134e4a;roughness:0.9"></a-plane>
    <a-plane width="24" height="10" position="0 5 10" rotation="0 180 0"
      material="color:#134e4a;roughness:0.9"></a-plane>
    <a-plane width="20" height="10" position="-12 5 0" rotation="0 90 0"
      material="color:#0f3d3a;roughness:0.9"></a-plane>
    <a-plane width="20" height="10" position="12 5 0" rotation="0 -90 0"
      material="color:#0f3d3a;roughness:0.9"></a-plane>
    <a-plane width="24" height="20" rotation="-90 0 0" position="0 0 0"
      material="color:#042f2e;roughness:0.8"></a-plane>
    <a-plane width="24" height="20" rotation="90 0 0" position="0 10 0"
      material="color:#021f1e;roughness:0.9"></a-plane>
    <a-light type="point" color="#2dd4bf" intensity="0.9" position="0 8 0"></a-light>

    <a-plane width="16" height="8" position="0 5 -9.8"
      material="color:#000;opacity:0.95"></a-plane>
    <a-text value="University Projects" position="0 8.5 -9.7" align="center" color="#2dd4bf" width="12"></a-text>
    <a-text value="Відео-презентації проектів" position="0 1.5 -9.7" align="center" color="#5eead4" width="8"></a-text>

    <a-plane width="4" height="7" position="0 3.5 9.8" rotation="0 180 0"
      material="color:#f59e0b;opacity:0.65;transparent:true"></a-plane>
    <a-text value="Хол" position="0 7.2 9.7" align="center" color="#fcd34d" width="4" rotation="0 180 0"></a-text>
    <a-plane width="4" height="7" position="0 3.5 9.8" rotation="0 180 0"
      class="gaze-portal" material="opacity:0;transparent:true"
      data-dest-x="0" data-dest-y="1.6" data-dest-z="0" data-rot="0"
      data-room="Головний хол"></a-plane>
  </a-entity>

  <!-- ══════════════════════════════════════════
       COSMIC HALL  Z=-80
  ══════════════════════════════════════════ -->
  <a-entity id="cosmic-hall" position="0 0 -150">

    <!-- Скляні стіни -->
    <a-box width="50" height="12" depth="50" position="0 6 0"
      material="color:#b8d4ff;opacity:0.08;transparent:true;side:double"></a-box>

    <!-- Підлога дзеркальна -->
    <a-plane width="50" height="50" rotation="-90 0 0"
      material="color:#dde8ff;opacity:0.15;metalness:0.8;roughness:0.1;transparent:true"></a-plane>

    <!-- Планети -->
    <a-sphere position="-80 20 -60" radius="28" color="#f0c06e" roughness="0.7"
      animation="property:rotation;to:0 360 0;loop:true;dur:40000;easing:linear"></a-sphere>
    <a-sphere position="90 15 -50" radius="18" color="#7c9fff" roughness="0.6"
      animation="property:rotation;to:0 360 0;loop:true;dur:55000;easing:linear"></a-sphere>
    <a-sphere position="-50 50 -90" radius="14" color="#a78bfa" roughness="0.8"
      animation="property:rotation;to:0 360 0;loop:true;dur:35000;easing:linear"></a-sphere>
    <a-sphere position="60 35 -70" radius="10" color="#f87171" roughness="0.75"
      animation="property:rotation;to:0 360 0;loop:true;dur:28000;easing:linear"></a-sphere>
    <a-sphere position="0 60 -100" radius="20" color="#fde68a" roughness="0.65"
      animation="property:rotation;to:0 360 0;loop:true;dur:60000;easing:linear"></a-sphere>
    <a-sphere position="-30 -10 -60" radius="8" color="#6ee7b7" roughness="0.7"
      animation="property:rotation;to:0 360 15;loop:true;dur:32000;easing:linear"></a-sphere>

    <!-- Освітлення -->
    <a-light type="ambient" color="#e8f0ff" intensity="1.6"></a-light>
    <a-light type="point" color="#a78bfa" intensity="0.8" position="-18 10 0"
      animation="property:intensity;from:0.4;to:1.0;loop:true;dur:3000;direction:alternate"></a-light>
    <a-light type="point" color="#7dd3fc" intensity="0.8" position="18 10 0"
      animation="property:intensity;from:0.4;to:1.0;loop:true;dur:4000;direction:alternate"></a-light>
    <a-light type="point" color="#f472b6" intensity="0.6" position="0 10 -18"
      animation="property:intensity;from:0.2;to:0.8;loop:true;dur:2500;direction:alternate"></a-light>

    <!-- Disco lights -->

<script>
const label = document.getElementById('room-label');

document.querySelectorAll('.gaze-portal').forEach(portal => {
  portal.addEventListener('click', () => {
    const x = parseFloat(portal.dataset.destX);
    const y = parseFloat(portal.dataset.destY);
    const z = parseFloat(portal.dataset.destZ);
    const rot = parseFloat(portal.dataset.rot) || 0;
    const room = portal.dataset.room || '';
    document.getElementById('player').setAttribute('position', {x, y, z});
    document.getElementById('cam').setAttribute('rotation', {x:0, y:rot, z:0});
    if (room) label.textContent = room;
  });
});

// NFT Галерея — розміщення по колу
const CONTRACT = "0x19a9D64Fe37e02f7a07f3749fC1c58a6bcEa5E77";
const RPC = "https://ethereum-sepolia-rpc.publicnode.com";
const PINATA = "https://jade-improved-centipede-840.mypinata.cloud/ipfs/";
const PKEY = "9kVM15wkjhfYTkx56h3XsRr2lobCVNrcTr9W_J_k5ufe-LTNGW_Ao6_85UNuY9EU";

function iUrl(u){
  if(!u)return null;
  if(u.startsWith("ipfs://"))return PINATA+u.slice(7)+"?pinataGatewayToken="+PKEY;
  if(u.includes("mypinata.cloud"))return u.includes("?")?u:u+"?pinataGatewayToken="+PKEY;
  if(u.startsWith("http"))return u;
  return PINATA+u+"?pinataGatewayToken="+PKEY;
}

async function rpc(m,p){
  const r=await fetch(RPC,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({jsonrpc:"2.0",id:1,method:m,params:p})});
  return (await r.json()).result;
}

function enc(s,id){return s+id.toString(16).padStart(64,"0");}

function decStr(h){
  if(!h||h==="0x")return "";
  try{
    const c=h.slice(2);
    const l=parseInt(c.slice(64,128),16)*2;
    return decodeURIComponent(c.slice(128,128+l).replace(/../g,"%$&"));
  }catch{return "";}
}

function decAddr(h){return h&&h.length>=40?"0x"+h.slice(-40):"";}
function short(a){return a?a.slice(0,6)+"..."+a.slice(-4):"";}

function placeNFT(scene, pos, rot, meta, id, own){
  const g = document.createElement("a-entity");
  g.setAttribute("position", `${pos.x} ${pos.y} ${pos.z}`);
  g.setAttribute("rotation", `0 ${rot} 0`);

  // Рамка в стилі галереї
  const frame = document.createElement("a-plane");
  frame.setAttribute("width","8");
  frame.setAttribute("height","9");
  frame.setAttribute("material","color:#f8f5f0;roughness:0.9");
  frame.setAttribute("position","0 0 -0.04");
  g.appendChild(frame);

  // Зображення
  const img = document.createElement("a-plane");
  img.setAttribute("width","7.4");
  img.setAttribute("height","7.4");
  const url = iUrl(meta.image);
  if(id === 15){
      img.setAttribute("material","src:#nft-video-15;shader:flat");
    } else if(url){
      const imgEl = document.createElement("img");
      imgEl.setAttribute("src", url);
      imgEl.setAttribute("crossorigin", "anonymous");
      imgEl.id = "nft-img-"+id;
      document.querySelector("a-assets").appendChild(imgEl);
      imgEl.onload = () => img.setAttribute("material", "src:#nft-img-"+id+";shader:flat");
      imgEl.onerror = () => img.setAttribute("material", "color:#2a1a4a");
    } }
  else img.setAttribute("material","color:#2a1a4a");
  img.setAttribute("position","0 0.8 0");
  g.appendChild(img);

  // Табличка під зображенням
  const plate = document.createElement("a-plane");
  plate.setAttribute("width","8");
  plate.setAttribute("height","2.2");
  plate.setAttribute("position","0 -4.5 -0.02");
  plate.setAttribute("material","color:#1a1a1a");
  g.appendChild(plate);

  // Назва
  const title = document.createElement("a-entity");
  title.setAttribute("position","0 -4.0 0.02");
  title.setAttribute("text",`value:${meta.name||"NFT #"+id};align:center;color:#ffffff;width:6.0;wrapCount:24`);
  g.appendChild(title);

  // Власник
  const owner = document.createElement("a-entity");
  owner.setAttribute("position","0 -4.6 0.02");
  owner.setAttribute("text",`value:${own};align:center;color:#888888;width:7.0;wrapCount:30`);
  g.appendChild(owner);

  // Номер токену
  const num = document.createElement("a-entity");
  num.setAttribute("position","-3.5 4.2 0.02");
  num.setAttribute("text",`value:#${id};align:left;color:#ffd700;width:2.5;wrapCount:10`);
  g.appendChild(num);

  scene.appendChild(g);
}

async function loadGalleryNFT(scene, id, pos, rot){
  try{
    const uh = await rpc("eth_call",[{to:CONTRACT,data:enc("0xc87b56dd",id)},"latest"]);
    const uri = decStr(uh);
    if(!uri)return;
    let meta;
    if(uri.startsWith("data:application/json;base64,")) meta=JSON.parse(atob(uri.slice(29)));
    else if(uri.startsWith("data:application/json,")) meta=JSON.parse(decodeURIComponent(uri.slice(22)));
    else{const r=await fetch(iUrl(uri));meta=await r.json();}
    const oh = await rpc("eth_call",[{to:CONTRACT,data:enc("0x6352211e",id)},"latest"]);
    placeNFT(scene, pos, rot, meta, id, decAddr(oh));
  }catch(e){
    console.warn("Gallery NFT #"+id,e);
    placeNFT(scene, {x:pos.x,y:pos.y,z:pos.z}, rot, {name:"NFT #"+id,image:null}, id, "");
  }
}

async function buildGallery(){
  const scene = document.querySelector("a-scene");
  const GALLERY_X = -120;
  const RADIUS = 45;
  const TOTAL = 30;

  for(let i=0;i<TOTAL;i++){
    const angle = (i/TOTAL)*Math.PI*2 - Math.PI/2;
    const x = GALLERY_X + Math.sin(angle)*RADIUS;
    const z = Math.cos(angle)*RADIUS;
    const rot = -(angle*180/Math.PI);
    const pos = {x, y:6, z};
    loadGalleryNFT(scene, i, pos, rot);
    await new Promise(r=>setTimeout(r,200));
  }
}

document.addEventListener("DOMContentLoaded",()=>{
  const s=document.querySelector("a-scene");
  s.hasLoaded?buildGallery():s.addEventListener("loaded",buildGallery);
});
</script>
