  <a-cylinder height="0.9" radius="0.25" position="25 0.45 10" material="color:#f5f5f0;roughness:0.95"></a-cylinder>
  <a-cylinder height="1.4" radius="0.2" position="25 1.1 10" material="color:#4ade80;roughness:0.8"></a-cylinder>
  <!-- Портал → Хол -->
  <a-plane width="7" height="10" position="0 5 26" material="color:#f59e0b;opacity:0.65;transparent:true"></a-plane>
  <a-text value="Хол" position="0 10.5 25.9" align="center" color="#fcd34d" width="6" rotation="0 180 0"></a-text>
  <a-plane width="7" height="10" position="0 5 26" class="gaze-portal" material="opacity:0;transparent:true" data-dest-x="0" data-dest-y="1.6" data-dest-z="0" data-rot="0" data-room="Головний хол"></a-plane>
</a-entity>

<!-- КАМЕРА -->
<a-entity id="player" position="0 1.6 20">
  <a-camera id="cam" wasd-controls look-controls>
    <a-cursor color="#ffffff" fuse="true" fuse-timeout="2000" raycaster="objects: .gaze-portal" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: white; shader: flat"></a-cursor>
  </a-camera>
</a-entity>

</a-scene>

<script>
const label = document.getElementById('room-label');
document.querySelectorAll('.gaze-portal').forEach(p => {
  p.addEventListener('click', () => {
    const x=parseFloat(p.dataset.destX), y=parseFloat(p.dataset.destY), z=parseFloat(p.dataset.destZ), rot=parseFloat(p.dataset.rot)||0;
    document.getElementById('player').setAttribute('position',{x,y,z});
    document.getElementById('cam').setAttribute('rotation',{x:0,y:rot,z:0});
    if(p.dataset.room) label.textContent=p.dataset.room;
  });
});

const CONTRACT="0x19a9D64Fe37e02f7a07f3749fC1c58a6bcEa5E77";
const RPC="https://ethereum-sepolia-rpc.publicnode.com";
const PINATA="https://jade-improved-centipede-840.mypinata.cloud/ipfs/";
const PKEY="9kVM15wkjhfYTkx56h3XsRr2lobCVNrcTr9W_J_k5ufe-LTNGW_Ao6_85UNuY9EU";

function iUrl(u){if(!u)return null;if(u.startsWith("ipfs://"))return PINATA+u.slice(7)+"?pinataGatewayToken="+PKEY;if(u.includes("mypinata.cloud"))return u.includes("?")?u:u+"?pinataGatewayToken="+PKEY;if(u.startsWith("http"))return u;return PINATA+u+"?pinataGatewayToken="+PKEY;}
async function rpc(m,p){const r=await fetch(RPC,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({jsonrpc:"2.0",id:1,method:m,params:p})});return(await r.json()).result;}
function enc(s,id){return s+id.toString(16).padStart(64,"0");}
function decStr(h){if(!h||h==="0x")return "";try{const c=h.slice(2);const l=parseInt(c.slice(64,128),16)*2;return decodeURIComponent(c.slice(128,128+l).replace(/../g,"%$&"));}catch{return "";}}
function decAddr(h){return h&&h.length>=40?"0x"+h.slice(-40):"";}

function placeNFT(scene,pos,rot,meta,id,own){
  const g=document.createElement("a-entity");
  g.setAttribute("position",`${pos.x} ${pos.y} ${pos.z}`);
  g.setAttribute("rotation",`0 ${rot} 0`);
  const fr=document.createElement("a-plane");
  fr.setAttribute("width","9");fr.setAttribute("height","10");
  fr.setAttribute("material","color:#f8f5f0;roughness:0.9");
  fr.setAttribute("position","0 0 -0.05");
  g.appendChild(fr);
  const im=document.createElement("a-plane");
  im.setAttribute("width","8.4");im.setAttribute("height","8.4");
  im.setAttribute("position","0 0.5 0");
  if(id===15){
    im.setAttribute("material","src:#nft-video-15;shader:flat");
  } else {
    const imgEl=document.createElement("img");
    imgEl.setAttribute("src",iUrl(meta.image));
    imgEl.setAttribute("crossorigin","anonymous");
    imgEl.id="nft-img-"+id;
    document.querySelector("a-assets").appendChild(imgEl);
    imgEl.onload=()=>im.setAttribute("material","src:#nft-img-"+id+";shader:flat");
    imgEl.onerror=()=>im.setAttribute("material","color:#2a1a4a");
  }
  g.appendChild(im);
  const bg=document.createElement("a-plane");
  bg.setAttribute("width","9");bg.setAttribute("height","2.8");
  bg.setAttribute("position","0 -4.6 -0.02");
  bg.setAttribute("material","color:#1a1a1a");
  g.appendChild(bg);
  const mk=(v,p,c,w)=>{const e=document.createElement("a-entity");e.setAttribute("position",p);e.setAttribute("text",`value:${v};align:center;color:${c};width:${w};wrapCount:28`);return e;};
  g.appendChild(mk(meta.name||"NFT #"+id,"0 -4.0 0.02","#ffffff",7.0));
  g.appendChild(mk(own,"0 -4.8 0.02","#aaaaaa",5.5));
  g.appendChild(mk("#"+id,"-4.0 4.6 0.02","#ffd700",2.5));
  scene.appendChild(g);
}

async function loadGalleryNFT(scene,id,pos,rot){
  try{
    const uh=await rpc("eth_call",[{to:CONTRACT,data:enc("0xc87b56dd",id)},"latest"]);
    const uri=decStr(uh);if(!uri)return;
    let meta;
    if(uri.startsWith("data:application/json;base64,"))meta=JSON.parse(atob(uri.slice(29)));
    else if(uri.startsWith("data:application/json,"))meta=JSON.parse(decodeURIComponent(uri.slice(22)));
    else{const r=await fetch(iUrl(uri));meta=await r.json();}
    const oh=await rpc("eth_call",[{to:CONTRACT,data:enc("0x6352211e",id)},"latest"]);
    placeNFT(scene,pos,rot,meta,id,decAddr(oh));
  }catch(e){console.warn("NFT #"+id,e);placeNFT(scene,{x:pos.x,y:pos.y,z:pos.z},rot,{name:"NFT #"+id,image:null},id,"");}
}

async function buildGallery(){
  const scene=document.querySelector("a-scene");
  const GALLERY_X=-120, RADIUS=42, TOTAL=30;
  for(let i=0;i<TOTAL;i++){
    const angle=(i/TOTAL)*Math.PI*2-Math.PI/2;
    const x=GALLERY_X+Math.sin(angle)*RADIUS;
    const z=Math.cos(angle)*RADIUS;
    const rot=-(angle*180/Math.PI);
    loadGalleryNFT(scene,i,{x,y:6,z},rot);
    await new Promise(r=>setTimeout(r,200));
  }
}

document.addEventListener("DOMContentLoaded",()=>{
  const s=document.querySelector("a-scene");
  s.hasLoaded?buildGallery():s.addEventListener("loaded",buildGallery);
});
</script>
</body>
</html>
